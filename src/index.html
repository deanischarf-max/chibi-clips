<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>B&amp;M Clips</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f8;--bg2:#ffffff;--bg3:#eef0f4;--bg4:#dde1e8;--accent:#e94560;--green:#1bd96a;--gold:#f5a623;--txt:#1a1a2e;--dim:#888;--border:rgba(0,0,0,.08);--r:10px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;height:100vh;user-select:none}
.hidden{display:none!important}

/* Titlebar */
.titlebar{display:flex;align-items:center;height:34px;background:#fff;border-bottom:1px solid var(--border);padding:0 8px;-webkit-app-region:drag}
.titlebar-title{font-size:13px;color:var(--dim);font-weight:600;flex:1;padding-left:8px}
.titlebar-btns{display:flex;gap:2px;-webkit-app-region:no-drag}
.tb{width:34px;height:34px;border:none;background:0 0;color:var(--dim);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.tb:hover{background:rgba(0,0,0,.06);color:var(--txt)}.tb-close:hover{background:#e81123;color:#fff}

/* Layout */
.app{display:flex;height:calc(100vh - 34px)}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:12px;gap:6px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Sidebar */
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border:none;background:0 0;color:var(--dim);cursor:pointer;border-radius:var(--r);font-size:13px;font-weight:500;text-align:left;transition:.15s}
.nav-btn:hover{background:var(--bg3);color:var(--txt)}
.nav-btn.active{background:var(--bg4);color:var(--txt)}
.nav-icon{font-size:18px}
.sidebar-footer{margin-top:auto;padding-top:12px;border-top:1px solid var(--border)}
.rec-status{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:12px;color:var(--dim)}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#444}
.rec-dot.active{background:#e94560;box-shadow:0 0 8px rgba(233,69,96,.5);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.header h2{font-size:20px;font-weight:700}
.header-actions{display:flex;gap:8px}
.btn{border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;padding:8px 16px;transition:.2s;display:flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#ff5a75}
.btn-ghost{background:#fff;color:var(--dim);border:1px solid var(--border)}.btn-ghost:hover{color:var(--txt);border-color:#aaa}
.btn-green{background:var(--green);color:#0a1a10}.btn-green:hover{background:#22e876}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{background:rgba(233,69,96,.15);color:var(--accent);border:1px solid rgba(233,69,96,.3)}.btn-danger:hover{background:rgba(233,69,96,.25)}

/* Clips Grid */
.content{flex:1;overflow-y:auto;padding:20px}
.clips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.clip-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.2s}
.clip-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.clip-thumb{width:100%;aspect-ratio:16/9;background:#000;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.clip-thumb video{width:100%;height:100%;object-fit:cover}
.clip-thumb .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);opacity:0;transition:.2s;font-size:40px;color:#fff}
.clip-card:hover .play-overlay{opacity:1}
.clip-duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.8);padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600}
.clip-info{padding:10px 12px}
.clip-name{font-weight:600;font-size:13px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.clip-meta{display:flex;gap:12px;font-size:11px;color:var(--dim)}
.clip-actions{display:flex;gap:6px;padding:0 12px 10px}

/* Recording Panel */
.rec-panel{padding:20px}
.source-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px}
.source-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.2s}
.source-card:hover{border-color:var(--accent)}
.source-card.selected{border-color:var(--green);box-shadow:0 0 12px rgba(27,217,106,.2)}
.source-card img{width:100%;aspect-ratio:16/9;object-fit:cover;background:#000}
.source-card .source-name{padding:8px 10px;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-controls{display:flex;gap:12px;margin-top:20px;align-items:center}
.rec-btn{width:60px;height:60px;border-radius:50%;border:3px solid var(--accent);background:0 0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.rec-btn:hover{background:rgba(233,69,96,.15)}
.rec-btn .rec-inner{width:24px;height:24px;background:var(--accent);border-radius:50%;transition:.2s}
.rec-btn.recording .rec-inner{border-radius:4px;width:20px;height:20px}
.rec-time{font-size:24px;font-weight:700;font-family:monospace;color:var(--accent)}
.rec-settings{display:flex;gap:16px;margin-top:16px;font-size:13px;color:var(--dim)}
.rec-settings label{display:flex;align-items:center;gap:6px}
.rec-settings select{background:var(--bg);border:1px solid var(--border);color:var(--txt);padding:4px 8px;border-radius:6px;font-size:12px}

/* Clip Player Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;max-width:900px;width:90%;max-height:85vh;overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.modal-close{background:0 0;border:0;color:var(--dim);font-size:22px;cursor:pointer}.modal-close:hover{color:var(--txt)}
.modal-body{padding:0}
.modal-body video{width:100%;max-height:60vh;background:#000}
.modal-footer{padding:12px 18px;display:flex;gap:8px;border-top:1px solid var(--border)}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--dim);gap:12px}
.empty-icon{font-size:64px;opacity:.3}
.empty-text{font-size:16px}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid var(--border);padding:10px 22px;border-radius:var(--r);font-size:13px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.1)}

/* Scrollbar */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:0 0}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
</style>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title" style="font-weight:800;color:var(--accent)">B&amp;M</span>
    <div class="titlebar-btns">
      <button class="tb" onclick="api.minimize()">&#9472;</button>
      <button class="tb" onclick="api.maximize()">&#9633;</button>
      <button class="tb tb-close" onclick="api.close()">&#10005;</button>
    </div>
  </div>

  <div class="app">
    <div class="sidebar">
      <button class="nav-btn active" data-tab="clips"><span class="nav-icon">&#127916;</span> Meine Clips</button>
      <button class="nav-btn" data-tab="record"><span class="nav-icon">&#128308;</span> Aufnehmen</button>
      <button class="nav-btn" data-tab="settings"><span class="nav-icon">&#9881;</span> Einstellungen</button>
      <div class="sidebar-footer">
        <div class="rec-status"><div class="rec-dot" id="recDot"></div><span id="recLabel">Bereit</span></div>
        <div style="font-size:11px;color:var(--dim);padding:4px 12px">F9 = Clip speichern</div>
      </div>
    </div>

    <div class="main">
      <!-- Clips Tab -->
      <div class="tab active" id="tab-clips">
        <div class="header">
          <h2>Meine Clips</h2>
          <div class="header-actions">
            <button class="btn btn-ghost btn-sm" id="btnImport">&#128230; Importieren</button>
            <button class="btn btn-ghost btn-sm" id="btnFolder">&#128193; Ordner oeffnen</button>
          </div>
        </div>
        <div class="content">
          <div class="clips-grid" id="clipsGrid"></div>
          <div class="empty hidden" id="emptyClips">
            <div class="empty-icon">&#127916;</div>
            <div class="empty-text">Noch keine Clips</div>
            <div style="color:var(--dim);font-size:13px">Nimm etwas auf oder importiere Videos</div>
          </div>
        </div>
      </div>

      <!-- Record Tab -->
      <div class="tab hidden" id="tab-record">
        <div class="header"><h2>Aufnehmen</h2></div>
        <div class="rec-panel">
          <p style="color:var(--dim);margin-bottom:12px">Waehle einen Bildschirm oder ein Fenster zum Aufnehmen:</p>
          <div class="source-grid" id="sourceGrid"></div>
          <div class="rec-controls">
            <button class="rec-btn" id="recBtn"><div class="rec-inner"></div></button>
            <div class="rec-time" id="recTime">00:00</div>
            <div style="flex:1"></div>
            <span style="color:var(--dim);font-size:12px" id="recSource">Keine Quelle gewaehlt</span>
          </div>
          <div class="rec-settings">
            <label>Qualitaet: <select id="qualitySelect"><option value="high">Hoch (1080p)</option><option value="medium">Mittel (720p)</option><option value="low">Niedrig (480p)</option></select></label>
            <label>Clip-Laenge: <select id="clipLength"><option value="15">15 Sek</option><option value="30" selected>30 Sek</option><option value="60">60 Sek</option><option value="120">2 Min</option></select></label>
          </div>
        </div>
      </div>

      <!-- Settings Tab -->
      <div class="tab hidden" id="tab-settings">
        <div class="header"><h2>Einstellungen</h2></div>
        <div class="content">
          <div style="max-width:400px;display:flex;flex-direction:column;gap:14px">
            <label style="font-size:13px;color:var(--dim)">Hotkey fuer Clip</label>
            <div style="background:var(--bg3);padding:10px 14px;border-radius:8px;font-weight:700">F9</div>
            <label style="font-size:13px;color:var(--dim)">Clips-Ordner</label>
            <div style="background:var(--bg3);padding:10px 14px;border-radius:8px;font-size:12px;color:var(--dim);cursor:pointer" onclick="api.openClipsFolder()" id="clipsDirLabel">Laden...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Player Modal -->
  <div class="modal hidden" id="playerModal">
    <div class="modal-box">
      <div class="modal-header">
        <span id="playerTitle">Clip</span>
        <button class="modal-close" onclick="closePlayer()">&#10005;</button>
      </div>
      <div class="modal-body"><video id="playerVideo" controls></video></div>
      <div class="modal-footer">
        <button class="btn btn-danger btn-sm" id="btnDeleteClip">&#128465; Loeschen</button>
        <div style="flex:1"></div>
        <button class="btn btn-ghost btn-sm" onclick="closePlayer()">Schliessen</button>
      </div>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
