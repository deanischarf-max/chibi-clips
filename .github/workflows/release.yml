name: Build & Release
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            cmd: npm run build-win
          - os: ubuntu-latest
            cmd: npm run build
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: ${{ matrix.cmd }}
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.AppImage
          if-no-files-found: warn
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.5.0
          name: B&M Clips v1.5.0
          files: dist/*
          body: |
            ## B&M Clips v1.5.0
            Helles Design + B&M Branding
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
